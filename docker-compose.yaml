services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "5002:80"
    volumes:
      - .:/app
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"